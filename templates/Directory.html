<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GMC Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="{{url_for('static',filename='css/bootstrap.min.css')}}" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<header>
    <div class="navbar-header">
        <a class="navbar-brand" href="/">
            <img style ="max-width:120px; margin-top: -7px;" src="{{ url_for('static', filename='images/gateway management company logo.png') }}">
        </a>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <form class="form-inline my-2 my-lg-0" method="post" action="{{ url_for('handle_data') }}">
          <input class="form-control mr-sm-2" type="search" name = "searchProperty" placeholder="Search" aria-label="Search">
          <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
        </form>
      </div>
    </nav>


</header>

<div class="container-fluid" style="min-height:100% width:80%">
    <body>

        <div  role="tabpanel">
            <!--- Nav tabs --->
            <ul class="nav nav-tabs nav justify-content-center" role="tablist">
              <li role="presentation" class="nav-item">
                <a class="nav-link active" data-toggle="tab" href="#Properties" aria-controls="Properties" role="tab">Properties</a>
              </li>
              <li role="presentation" class="nav-item">
                <a class="nav-link" data-toggle = "tab" href="#Corporate" aria-controls="Corporate" role="tab">Corporate</a>
              </li>
            </ul>

            <!-- Tab panes -->
            <div class="tab-content">
              <div role="tabpanel" class="tab-pane active" id="Properties">
                <table class="table table-striped table-hover">
                  <thead>
                    <tr>
                      <th scope="col">#</th>
                      <th scope="col">Property Name</th>
                      <th scope="col">Phone Number</th>
                    </tr>
                  </thead>
                  <tbody>
                    {% for row in DirectoryTable %}
                    <tr>
                        <th scope="row">{{loop.index}}</th>
                        <td><a href="#" data-toggle="modal" data-target='#{{row[0].replace(" ", "").replace(".", "").replace("&", "").replace(",", "").replace("(", "").replace(")", "")}}' class="btn btn-success">{{row[0]}} </a></td>
                        <div class="modal fade" id="{{row[0].replace(' ', '').replace('.','').replace('&', '').replace(',', '').replace('(', '').replace(')', '')}}" role="dialog" aria-labelledby="myModalLabel">
                            <div class="modal-dialog">
                              <!-- Modal content-->
                              <div class="modal-content">
                                <div class="modal-header">
                                  <h4 class="modal-title">{{row[0]}}</h4>
                                </div>
                                <div class="modal-body">
                                    <p>Manager: {{row[2]}}</p>
                                    <p>Assistant: {{row[3]}}</p>
                                    <p>Regional: {{row[1]}}</p>
                                    <p>Street Address: {{row[5]}}</p>
                                    <p>City: {{row[6]}}</p>
                                    <p>State: {{row[7]}}</p>
                                </div>
                                <div class="modal-footer">
                                  <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
                                </div>
                              </div>

                            </div>
                        <td>{{row[9]}}</td>
                    </tr>
                    {% endfor %}
                  </tbody>
                </table>
              </div>
              <div role="tabpanel" class="tab-pane" id="Corporate">Corporate</div>
            </div>
        </div>

    </body>


</div>








</html>
